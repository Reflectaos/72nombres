<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>72 Nombres • Meditación Diaria</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#5c3310">
    
    <style>
        :root {
            --gold: #d4af37;
            --earth: #5c3310;
            --light: #f8f5eb;
            --dark: #2c1e12;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8f5eb, #e8d9c0);
            color: #333;
            min-height: 100vh;
        }
        header {
            background: var(--dark);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
        }
        .container { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
        .progress { text-align: center; font-size: 1.2rem; color: var(--earth); margin: 1rem 0; font-weight: 600; }
        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(92, 51, 16, 0.15);
            padding: 2.5rem;
            margin-bottom: 2rem;
        }
        .hebreo {
            font-size: 4.5rem;
            text-align: center;
            direction: rtl;
            letter-spacing: 20px;
            color: var(--gold);
            margin: 1.8rem 0;
            text-shadow: 0 6px 15px rgba(212, 175, 55, 0.4);
        }
        .verse {
            background: #f8f1e3;
            border-left: 6px solid var(--gold);
            padding: 1.5rem;
            border-radius: 0 16px 16px 0;
            margin: 2rem 0;
            font-style: italic;
            color: #444;
        }
        .info { display: flex; gap: 2rem; flex-wrap: wrap; margin: 1.5rem 0; }
        .info p { flex: 1; min-width: 200px; }
        button {
            padding: 14px 32px;
            background: var(--earth);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #8b5a2b; transform: translateY(-4px); }
        .nav { display: flex; justify-content: space-between; margin: 1.5rem 0; }
    </style>
</head>

    </header>

            <button onclick="prevDay()">← Anterior</button>

        let currentDay = 1;

        function loadDay(day) {
            currentDay = Math.max(1, Math.min(90, day));
            document.getElementById('current-day').textContent = currentDay;

            const name = names72.find(n => n.num === currentDay) || {num:currentDay, hebreo:"🔄", trans:"Día de Integración", significado:"Reflexiona sobre tu camino"};

            document.getElementById('content').innerHTML = `
                <h2>Día ${currentDay} — ${name.hebreo} (${name.trans})</h2>
                <div class="hebreo">${name.hebreo}</div>
                
                <div class="info">
                    <p><strong>Ángel:</strong> ${name.angel}</p>
                    <p><strong>Salmo:</strong> ${name.salmo}</p>
                </div>

                <div class="section">
                    <h3>📖 Versículo Base</h3>
                    <div class="verse">
                        Éxodo 14:19-21 — "Y el Ángel de Dios... se movió detrás de ellos... y la columna de nube se movió de delante de ellos y se paró detrás de ellos... Y extendió Moisés su mano sobre el mar... y el mar se abrió."
                    </div>
                </div>

                <div class="section">
                    <h3>👁️ Meditación Visual</h3>
                    <p>Respira profundamente. Escanea las letras de derecha a izquierda. Visualiza cada letra brillando con luz dorada que llena tu ser.</p>
                </div>

                <div class="section">
                    <h3>💭 Reflexión</h3>
                    <p><strong>${name.significado}</strong></p>
                    <p style="margin-top:12px;">¿Cómo puedo vivir esta energía hoy?</p>
                </div>

                <button onclick="completeDay()">✅ Completar Día ${currentDay} y Continuar</button>
            `;
        }

        function nextDay() { loadDay(currentDay + 1); }
        function prevDay() { loadDay(currentDay - 1); }
        function completeDay() {
            if (currentDay < 90) {
                alert(`¡Día ${currentDay} completado! Que la Luz te acompañe.`);
                nextDay();
            } else {
                alert("¡Felicidades! Has completado los 90 días.");
            }
        }

        window.onload = () => loadDay(1);
    </script>

</html>
